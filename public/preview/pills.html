<!doctype html>
<!-- @dsCard group="Components" name="Pills" subtitle="Service tags and badges" viewport="700x160" -->
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:28px; background: var(--bg); display:flex; flex-wrap:wrap; gap:10px; align-items:center; }
  .pill { display:inline-flex; align-items:center; gap:8px; padding:8px 16px; border-radius: 999px; font-size: 13px; font-weight: 500; letter-spacing: -0.005em; }
  .a { background: var(--evo-mint-50); color: var(--evo-mint-700); border: 1px solid var(--evo-mint-100); }
  .b { background: var(--evo-mint); color: #1B3530; }
  .c { background: white; color: var(--fg); border: 1px solid var(--line); }
  .d { background: var(--evo-mint-800); color: var(--evo-mint-50); }
  .e { background: var(--evo-cream); color: var(--evo-mint-800); border: 1px solid var(--evo-sand); }
  .dot { width:6px; height:6px; border-radius: 50%; background: currentColor; opacity: 0.6; }
</style></head>
<body>
  <span class="pill a"><span class="dot"></span>Limpieza</span>
  <span class="pill a">Blanqueamiento</span>
  <span class="pill a">Ortodoncia</span>
  <span class="pill b">Nuevo</span>
  <span class="pill c">Diseño de sonrisa</span>
  <span class="pill d">Premium</span>
  <span class="pill e">Sin costo</span>
  <span class="pill a">Carillas</span>
  <span class="pill a">Resinas</span>
</body></html>
