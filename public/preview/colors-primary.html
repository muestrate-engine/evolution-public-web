<!doctype html>
<!-- @dsCard group="Colors" name="Mint Scale" subtitle="Primary brand mint, 50–900" viewport="700x200" -->
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px 28px; background: var(--bg); }
  h4 { margin:0 0 14px; font-weight:500; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color: var(--evo-mint-700); }
  .row { display:grid; grid-template-columns: repeat(10, 1fr); gap:8px; }
  .chip { aspect-ratio: 1/1.25; border-radius: 12px; padding: 10px; display:flex; flex-direction:column; justify-content:flex-end; box-shadow: var(--shadow-xs); border:1px solid rgba(0,0,0,0.03); }
  .chip code { font-family: ui-monospace, monospace; font-size:10px; opacity:0.85; }
  .chip .n { font-size:11px; font-weight:600; }
  .light { color: #1B3530; }
  .dark { color: #F2F9F7; }
</style></head>
<body>
  <h4>Mint scale — primary brand</h4>
  <div class="row">
    <div class="chip light" style="background:#F2F9F7"><div class="n">50</div><code>#F2F9F7</code></div>
    <div class="chip light" style="background:#E1F0EC"><div class="n">100</div><code>#E1F0EC</code></div>
    <div class="chip light" style="background:#C8E3DC"><div class="n">200</div><code>#C8E3DC</code></div>
    <div class="chip light" style="background:#ADD6CC"><div class="n">300</div><code>#ADD6CC</code></div>
    <div class="chip light" style="background:#98CAC0;outline:2px solid #5E9D90;outline-offset:-2px"><div class="n">400 ★</div><code>#98CAC0</code></div>
    <div class="chip dark" style="background:#7DB7AC"><div class="n">500</div><code>#7DB7AC</code></div>
    <div class="chip dark" style="background:#5E9D90"><div class="n">600</div><code>#5E9D90</code></div>
    <div class="chip dark" style="background:#467A6F"><div class="n">700</div><code>#467A6F</code></div>
    <div class="chip dark" style="background:#2F564F"><div class="n">800</div><code>#2F564F</code></div>
    <div class="chip dark" style="background:#1B3530"><div class="n">900</div><code>#1B3530</code></div>
  </div>
</body></html>
