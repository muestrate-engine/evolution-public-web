<!doctype html>
<!-- @dsCard group="Type" name="Eyebrow Lockup" subtitle="Signature uppercase eyebrow" viewport="700x220" -->
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:32px 36px; background: var(--bg); display:flex; flex-direction:column; gap: 22px; }
  .group { display:flex; flex-direction: column; gap: 4px; }
  .eyebrow { font-size: 12px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--evo-mint-700); }
  .eyebrow.muted { color: var(--fg-3); }
  .word { font-size: 32px; font-weight: 300; letter-spacing:-0.02em; color: var(--fg); }
  .note { font-size: 12px; color: var(--fg-3); font-family: ui-monospace, monospace; }
</style></head>
<body>
  <div class="group">
    <div class="eyebrow">Studio Dental</div>
    <div class="word">evolution</div>
    <div class="note">12px · 500 · letter-spacing 0.18em — signature lockup</div>
  </div>
  <div class="group">
    <div class="eyebrow muted">Nuestros Servicios</div>
    <div class="word">Cuidado dental con trato humano</div>
  </div>
</body></html>
