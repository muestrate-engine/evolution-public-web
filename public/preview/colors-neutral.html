<!doctype html>
<!-- @dsCard group="Colors" name="Neutrals" subtitle="Bone, cream, sand, graphite" viewport="700x210" -->
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px 28px; background: var(--bg); }
  h4 { margin:0 0 14px; font-weight:500; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color: var(--evo-mint-700); }
  .row { display:grid; grid-template-columns: repeat(6, 1fr); gap:10px; }
  .chip { aspect-ratio: 1/1.1; border-radius: 14px; padding: 12px; display:flex; flex-direction:column; justify-content:flex-end; box-shadow: var(--shadow-xs); border:1px solid rgba(0,0,0,0.05); }
  .chip code { font-family: ui-monospace, monospace; font-size:10.5px; opacity:0.85; }
  .chip .n { font-size:12px; font-weight:600; }
  .light { color: #2A2A28; }
  .dark { color: #FAF7F2; }
</style></head>
<body>
  <h4>Neutrals — bone, cream, graphite</h4>
  <div class="row">
    <div class="chip light" style="background:#FFFFFF;border:1px solid var(--line)"><div class="n">Pearl</div><code>#FFFFFF</code></div>
    <div class="chip light" style="background:#FAF7F2"><div class="n">Bone ★</div><code>#FAF7F2</code></div>
    <div class="chip light" style="background:#F5EFE6"><div class="n">Cream</div><code>#F5EFE6</code></div>
    <div class="chip light" style="background:#E8E2D7"><div class="n">Sand</div><code>#E8E2D7</code></div>
    <div class="chip dark" style="background:#6E6C66"><div class="n">Gray 500</div><code>#6E6C66</code></div>
    <div class="chip dark" style="background:#2A2A28"><div class="n">Graphite ★</div><code>#2A2A28</code></div>
  </div>
</body></html>
