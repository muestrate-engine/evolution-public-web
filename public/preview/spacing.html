<!doctype html>
<!-- @dsCard group="Spacing" name="Spacing" subtitle="8px-base scale, sp-1 → sp-9" viewport="700x200" -->
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px 28px; background: var(--bg); }
  .row { display:flex; align-items:flex-end; gap:14px; }
  .step { display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar { background: var(--evo-mint); border-radius: 6px; width: 40px; }
  .name { font-size: 11px; color: var(--fg-2); font-family: ui-monospace, monospace; }
  .px { font-size: 10px; color: var(--fg-3); }
  h4 { margin:0 0 18px; font-weight:500; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color: var(--evo-mint-700); }
</style></head>
<body>
  <h4>Spacing scale · 8px base</h4>
  <div class="row">
    <div class="step"><div class="bar" style="height:4px"></div><div class="name">sp-1</div><div class="px">4</div></div>
    <div class="step"><div class="bar" style="height:8px"></div><div class="name">sp-2</div><div class="px">8</div></div>
    <div class="step"><div class="bar" style="height:12px"></div><div class="name">sp-3</div><div class="px">12</div></div>
    <div class="step"><div class="bar" style="height:16px"></div><div class="name">sp-4</div><div class="px">16</div></div>
    <div class="step"><div class="bar" style="height:24px"></div><div class="name">sp-5</div><div class="px">24</div></div>
    <div class="step"><div class="bar" style="height:32px"></div><div class="name">sp-6</div><div class="px">32</div></div>
    <div class="step"><div class="bar" style="height:48px"></div><div class="name">sp-7</div><div class="px">48</div></div>
    <div class="step"><div class="bar" style="height:64px"></div><div class="name">sp-8</div><div class="px">64</div></div>
    <div class="step"><div class="bar" style="height:96px"></div><div class="name">sp-9</div><div class="px">96</div></div>
  </div>
</body></html>
