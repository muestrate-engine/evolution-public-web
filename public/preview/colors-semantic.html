<!doctype html>
<!-- @dsCard group="Colors" name="Semantic Colors" subtitle="Soft sage / ochre / terracotta" viewport="700x180" -->
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px 28px; background: var(--bg); }
  h4 { margin:0 0 16px; font-weight:500; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color: var(--evo-mint-700); }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap:14px; }
  .item { background: white; border-radius: 16px; padding: 14px 16px; border:1px solid var(--line); display:flex; align-items:center; gap:12px; }
  .dot { width:28px; height:28px; border-radius: 50%; flex-shrink:0; }
  .label { display:flex; flex-direction:column; gap:2px; }
  .name { font-size: 13px; font-weight: 600; color: var(--fg); }
  .hex { font-family: ui-monospace, monospace; font-size: 11px; color: var(--fg-2); }
</style></head>
<body>
  <h4>Semantic — soft status colours</h4>
  <div class="row">
    <div class="item"><div class="dot" style="background:#7AB5A0"></div><div class="label"><div class="name">Success · sage</div><div class="hex">#7AB5A0</div></div></div>
    <div class="item"><div class="dot" style="background:#E0B66A"></div><div class="label"><div class="name">Warning · ochre</div><div class="hex">#E0B66A</div></div></div>
    <div class="item"><div class="dot" style="background:#D08577"></div><div class="label"><div class="name">Danger · terracotta</div><div class="hex">#D08577</div></div></div>
  </div>
  <p style="margin:14px 2px 0;font-size:12px;color:var(--fg-2);line-height:1.5;">Status colours are intentionally muted — bright reds and greens break the brand calm.</p>
</body></html>
