<!doctype html>
<!-- @dsCard group="Type" name="Type Scale" subtitle="H1 → small, with specs" viewport="700x260" -->
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px 32px; background: var(--bg); }
  table { width:100%; border-collapse: collapse; }
  td { padding: 8px 12px 8px 0; vertical-align: baseline; }
  td.spec { width: 130px; font-family: ui-monospace, monospace; font-size: 11px; color: var(--fg-3); white-space: nowrap; }
  td.label { font-size: 11px; letter-spacing: 0.18em; text-transform:uppercase; color: var(--evo-mint-700); width: 80px; }
  .h1 { font-size: 56px; font-weight: 300; letter-spacing:-0.02em; line-height:1.05; }
  .h2 { font-size: 40px; font-weight: 400; letter-spacing:-0.01em; line-height:1.15; }
  .h3 { font-size: 24px; font-weight: 500; letter-spacing:-0.01em; }
  .body { font-size: 16px; font-weight: 400; }
  .small { font-size: 13px; color: var(--fg-2); }
</style></head>
<body>
  <table>
    <tr><td class="label">H1</td><td class="h1">Sonríe sin miedo</td><td class="spec">300 · 56 / 1.05</td></tr>
    <tr><td class="label">H2</td><td class="h2">Una experiencia distinta</td><td class="spec">400 · 40 / 1.15</td></tr>
    <tr><td class="label">H3</td><td class="h3">Servicios y paquetes</td><td class="spec">500 · 24 / 1.2</td></tr>
    <tr><td class="label">Body</td><td class="body">Te explicamos todo, paso a paso. Sin sorpresas.</td><td class="spec">400 · 16 / 1.6</td></tr>
    <tr><td class="label">Small</td><td class="small">Atendemos de lunes a sábado, con cita previa.</td><td class="spec">400 · 13 / 1.45</td></tr>
  </table>
</body></html>
