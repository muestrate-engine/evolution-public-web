<!doctype html>
<!-- @dsCard group="Spacing" name="Radii" subtitle="Corner radii from xs to pill" viewport="700x200" -->
<html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:24px 28px; background: var(--bg); }
  h4 { margin:0 0 18px; font-weight:500; font-size:11px; letter-spacing:0.18em; text-transform:uppercase; color: var(--evo-mint-700); }
  .row { display:flex; gap:18px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:10px; }
  .box { width: 70px; height: 70px; background: linear-gradient(135deg, #C8E3DC, #98CAC0); }
  .name { font-size:11px; color: var(--fg-2); font-family: ui-monospace, monospace; }
  .px { font-size: 10px; color: var(--fg-3); }
</style></head>
<body>
  <h4>Corner radii</h4>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:6px"></div><div class="name">xs</div><div class="px">6</div></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><div class="name">sm</div><div class="px">10</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="name">md</div><div class="px">16</div></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><div class="name">lg ★</div><div class="px">24</div></div>
    <div class="item"><div class="box" style="border-radius:32px"></div><div class="name">xl</div><div class="px">32</div></div>
    <div class="item"><div class="box" style="border-radius:44px"></div><div class="name">2xl</div><div class="px">44</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="name">pill</div><div class="px">∞</div></div>
  </div>
</body></html>
