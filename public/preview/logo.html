<!doctype html>
<!-- @dsCard group="Brand" name="Logo" subtitle="Primary lockup with brand colours" viewport="700x220" -->
<html lang="es"><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
  body { margin:0; padding:20px 32px; background: var(--bg); display:flex; align-items:center; gap:28px; min-height: 220px; }
  .mark { display:flex; align-items:center; gap:18px; }
  .word { font-size: 64px; font-weight: 300; letter-spacing:-0.02em; color: var(--evo-mint); line-height:1; }
  .sub  { font-size: 11px; font-weight: 500; letter-spacing: 0.32em; color: var(--evo-mint-600); margin-top: 6px; }
  .divider { width:1px; align-self: stretch; background: var(--line); }
  .meta { display:flex; flex-direction:column; gap:6px; color: var(--fg-2); font-size:13px; }
  .swatch { display:flex; align-items:center; gap:10px; }
  .swatch span:first-child { width:18px; height:18px; border-radius:50%; background: var(--evo-mint); display:inline-block; }
  code { font-family: ui-monospace, monospace; font-size: 12px; color: var(--fg); }
</style></head>
<body>
  <div class="mark">
    <img src="../assets/evolution-logo.svg" alt="Evolution" style="width:auto;height:160px;"/>
  </div>
  <div class="divider"></div>
  <div class="meta">
    <div class="swatch"><span></span><code>#98CAC0 — primary mint</code></div>
    <div class="swatch"><span style="background:#2A2A28"></span><code>#2A2A28 — graphite</code></div>
    <div class="swatch"><span style="background:#FAF7F2;border:1px solid var(--line)"></span><code>#FAF7F2 — bone</code></div>
    <div style="margin-top:8px;font-size:12px;letter-spacing:0.18em;text-transform:uppercase;color:var(--evo-mint-700);">Studio Dental</div>
    <div style="font-size:14px;font-weight:300;color:var(--fg);">Tu sonrisa, en su mejor versión.</div>
  </div>
</body></html>
